<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff8f79" />

    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BIG POMODORO" />

    <title>BIG POMODORO - Pomodoro Timer</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
    </style>
  </head>

  <body class="bg-[#240306] text-[#ffdede]">
    <!-- TopAppBar -->
    <header
      class="fixed top-0 w-full z-50 bg-[#181a1c]/40 backdrop-blur-xl flex items-center justify-between px-6 h-20 shadow-[0_20px_40px_rgba(255,119,94,0.08)]"
    >
      <div class="flex items-center gap-4">
        <button class="text-[#ababad] active:scale-95 transition-transform cursor-pointer" type="button">
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>
        <h1 class="text-2xl font-black tracking-tighter text-[#ff8f79] uppercase">BIG POMODORO</h1>
      </div>
      <div class="flex items-center gap-4">
        <button class="text-[#ababad] hover:text-[#ff8f79] transition-colors duration-300 active:scale-95" type="button" aria-label="알림">
          <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
        </button>
      </div>
    </header>

    <main class="min-h-screen pt-24 px-6 max-w-5xl mx-auto flex flex-col items-center">
      <!-- Hero Section -->
      <section class="w-full flex flex-col items-center justify-center space-y-12">
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#491219]/40 border border-[#a06568]/15 self-center">
          <span class="w-2 h-2 rounded-full bg-[#ff8f79] animate-pulse" aria-hidden="true"></span>
          <span class="font-bold text-[0.6875rem] uppercase tracking-[0.2em] text-[#dd9a9c]" id="modeBadgeText">집중</span>
        </div>

        <!-- Central Timer Display -->
        <div class="relative group w-full flex flex-col items-center">
          <!-- Background glow -->
          <div class="absolute inset-0 bg-[#ff8f79]/10 blur-[120px] rounded-full -z-10 transition-opacity duration-1000" aria-hidden="true"></div>

          <!-- Progress Ring (SVG) -->
          <div class="relative w-[320px] h-[320px] md:w-[420px] md:h-[420px] flex items-center justify-center">
            <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100" aria-hidden="true">
              <!-- Background Ring -->
              <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" />
              <!-- Progress Ring -->
              <circle
                id="timerRing"
                cx="50"
                cy="50"
                r="46"
                fill="none"
                stroke="url(#timerGradient)"
                stroke-dasharray="289"
                stroke-dashoffset="289"
                stroke-linecap="round"
                stroke-width="2.5"
              />
              <defs>
                <linearGradient id="timerGradient" x1="0%" x2="100%" y1="0%" y2="100%">
                  <stop offset="0%" stop-color="#ff8f79" />
                  <stop offset="100%" stop-color="#ff775e" />
                </linearGradient>
              </defs>
            </svg>

            <!-- Glass Countdown Display -->
            <div
              class="glass-panel w-[85%] h-[85%] rounded-full flex flex-col items-center justify-center shadow-[inset_0_2px_10px_rgba(255,255,255,0.05)] relative overflow-hidden"
            >
              <div class="absolute inset-0 bg-[#ff8f79]/5 pointer-events-none" aria-hidden="true"></div>
              <div
                id="timerText"
                class="text-[8rem] md:text-[10rem] font-bold tracking-tighter text-[#ffdede] leading-none tabular-nums"
                aria-live="polite"
              >
                25:00
              </div>
              <div class="flex items-center gap-2 mt-3">
                <span class="material-symbols-outlined text-sm text-[#ff8f79]" aria-hidden="true" id="modeIcon">local_fire_department</span>
                <span class="text-[0.6875rem] font-bold uppercase tracking-widest text-[#dd9a9c]" id="phaseLabel">Session 1/2</span>
              </div>
            </div>
          </div>

          <!-- Progress Bar -->
          <div class="w-full max-w-md h-2 bg-[#2b2c2f] rounded-full overflow-hidden mt-6" aria-hidden="true">
            <div id="progressFill" class="h-full molten-gradient w-[0%] rounded-full shadow-[0_0_20px_rgba(255,143,121,0.4)] transition-[width] duration-200"></div>
          </div>

          <!-- Focus Controls -->
          <div class="mt-8 flex flex-col md:flex-row items-center gap-6 w-full max-w-md">
            <button
              id="btnReset"
              class="w-full md:flex-1 py-5 rounded-xl border border-[#757578]/15 text-[#ffdede] font-semibold tracking-wide hover:bg-[#2b2c2f]/40 transition-all duration-300 active:scale-95"
              type="button"
            >
              초기화
            </button>

            <button
              id="btnStartPause"
              class="w-full md:flex-[1.5] py-5 rounded-xl bg-gradient-to-br from-[#ff8f79] to-[#ff775e] text-[#240306] font-bold text-lg shadow-[0_15px_35px_rgba(255,119,94,0.25)] hover:shadow-[0_20px_45px_rgba(255,119,94,0.35)] transition-all duration-300 active:scale-95"
              type="button"
            >
              시작
            </button>
          </div>
        </div>
      </section>

      <!-- Placeholder (so the layout matches the design canvas) -->
      <section class="w-full mt-12 hidden lg:block">
        <div class="opacity-40 text-center text-sm">타이머 화면</div>
      </section>
    </main>

    <!-- Bottom Navigation Anchor -->
    <nav
      class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-6 pt-3 bg-[#181a1c]/40 backdrop-blur-2xl rounded-t-[1.5rem] z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/5 md:hidden"
    >
      <a class="flex flex-col items-center justify-center text-[#ff8f79] bg-[#ff775e]/10 rounded-2xl p-3 shadow-[0_0_20px_rgba(255,119,94,0.2)] active:scale-90 transition-all" href="#">
        <span class="material-symbols-outlined text-2xl" aria-hidden="true">timer</span>
        <span class="text-[10px] font-bold uppercase tracking-widest mt-1">Timer</span>
      </a>
      <a class="flex flex-col items-center justify-center text-[#ababad] p-3 hover:bg-white/5 transition-all duration-300 active:scale-90" href="#">
        <span class="material-symbols-outlined text-2xl" aria-hidden="true">format_list_bulleted</span>
        <span class="text-[10px] font-bold uppercase tracking-widest mt-1">Tasks</span>
      </a>
      <a class="flex flex-col items-center justify-center text-[#ababad] p-3 hover:bg-white/5 transition-all duration-300 active:scale-90" href="#">
        <span class="material-symbols-outlined text-2xl" aria-hidden="true">bar_chart</span>
        <span class="text-[10px] font-bold uppercase tracking-widest mt-1">Stats</span>
      </a>
      <a class="flex flex-col items-center justify-center text-[#ababad] p-3 hover:bg-white/5 transition-all duration-300 active:scale-90" href="#">
        <span class="material-symbols-outlined text-2xl" aria-hidden="true">settings</span>
        <span class="text-[10px] font-bold uppercase tracking-widest mt-1">Settings</span>
      </a>
    </nav>
  </body>

  <script src="app.js"></script>
</html>
